services:
  app:
    build: .
    restart: always
    ports:
      - "3000:3000"
    environment:
      # 覆盖 .env.local 中的路径，指向容器内持久化卷
      DATABASE_URL: file:/app/data/dev.db
    env_file:
      - .env.local        # ADMIN_PASSWORD / JWT_SECRET / DEEPSEEK_API_KEY 等
    volumes:
      - db_data:/app/data              # SQLite 数据库持久化
      - uploads:/app/public/uploads    # 上传的壁纸、简历等文件持久化

volumes:
  db_data:
  uploads:
